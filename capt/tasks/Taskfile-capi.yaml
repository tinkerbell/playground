version: "3"

tasks:
  ordered:
    summary: |
      CAPI tasks run in order of dependency.
    cmds:
      - task: create-cluster-yaml
      - task: init
      - task: render-cluster-yaml

  create-cluster-yaml:
    run: once
    summary: |
      Render clusterctl config from the cue/clusterctl subpackage. Replaces
      the previous envsubst pipeline against templates/clusterctl.tmpl.
    vars:
      OUTPUT_DIR:
        sh: "echo $(yq eval '.outputDir' config.yaml)"
      CAPT_VERSION:
        sh: "yq eval '.versions.capt' {{.STATE_FILE_FQ_PATH}}"
    sources:
      - "{{.STATE_FILE_FQ_PATH}}"
      - cue/clusterctl/*.cue
      - cue/values/*.cue
    generates:
      - "{{.OUTPUT_DIR}}/clusterctl.yaml"
    cmds:
      - "cue vet ./cue/clusterctl yaml: {{.STATE_FILE_FQ_PATH}} -l 'values:'"
      - "cue export ./cue/clusterctl yaml: {{.STATE_FILE_FQ_PATH}} -l 'values:' -e out --out yaml > {{.OUTPUT_DIR}}/clusterctl.yaml"
    status:
      - grep -q "{{.CAPT_VERSION}}" {{.OUTPUT_DIR}}/clusterctl.yaml

  init:
    run: once
    deps: [create-cluster-yaml]
    summary: |
      Initialize the cluster.
    env:
      TINKERBELL_IP:
        sh: "yq eval '.tinkerbell.vip' {{.STATE_FILE_FQ_PATH}}"
      CLUSTERCTL_DISABLE_VERSIONCHECK: true
      XDG_CONFIG_HOME: "{{.OUTPUT_DIR}}/xdg"
      XDG_CONFIG_DIRS: "{{.OUTPUT_DIR}}/xdg"
      XDG_STATE_HOME: "{{.OUTPUT_DIR}}/xdg"
      XDG_CACHE_HOME: "{{.OUTPUT_DIR}}/xdg"
      XDG_RUNTIME_DIR: "{{.OUTPUT_DIR}}/xdg"
      XDG_DATA_HOME: "{{.OUTPUT_DIR}}/xdg"
      XDG_DATA_DIRS: "{{.OUTPUT_DIR}}/xdg"
    vars:
      OUTPUT_DIR:
        sh: "echo $(yq eval '.outputDir' config.yaml)"
      KIND_GATEWAY_IP:
        sh: "yq eval '.kind.gatewayIP' {{.STATE_FILE_FQ_PATH}}"
      KUBECONFIG:
        sh: "yq eval '.kind.kubeconfig' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - KUBECONFIG="{{.KUBECONFIG}}" clusterctl --config {{.OUTPUT_DIR}}/clusterctl.yaml init --infrastructure tinkerbell
    status:
      - expected=1; got=$(KUBECONFIG="{{.KUBECONFIG}}" kubectl get pods -n capt-system |grep -ce "capt-controller"); [[ "$got" == "$expected" ]]

  render-cluster-yaml:
    run: once
    summary: |
      Render the workload cluster manifest from the cue/capi subpackage.
      Inputs: capt/.state (read directly as YAML by cue) and the bootMode
      tag. Output: {{.OUTPUT_DIR}}/{{.CLUSTER_NAME}}.yaml — a multi-document
      YAML applied as-is by create-workload-cluster.
    vars:
      CLUSTER_NAME:
        sh: "yq eval '.clusterName' {{.STATE_FILE_FQ_PATH}}"
      OUTPUT_DIR:
        sh: "yq eval '.outputDir' config.yaml"
      BOOTMODE:
        sh: "yq eval '.bootMode' {{.STATE_FILE_FQ_PATH}}"
    sources:
      - "{{.STATE_FILE_FQ_PATH}}"
      - cue/capi/*.cue
      - cue/values/*.cue
      - cue/mirror/*.cue
    generates:
      - "{{.OUTPUT_DIR}}/{{.CLUSTER_NAME}}.yaml"
    cmds:
      # Lint the CUE module first; fails with line-numbered errors if any
      # constraints in cue/values/values.cue#Config are violated by .state.
      # The `yaml:` qualifier tells cue to read .state as YAML directly — no
      # intermediate JSON conversion needed.
      - "cue vet ./cue/capi yaml: {{.STATE_FILE_FQ_PATH}} -l 'values:'"
      - "cue export ./cue/capi yaml: {{.STATE_FILE_FQ_PATH}} -l 'values:' -t mode={{.BOOTMODE}} -e out --out text > {{.OUTPUT_DIR}}/{{.CLUSTER_NAME}}.yaml"
