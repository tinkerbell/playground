version: "3"

tasks:
  playground:
    summary: |
      Delete the CAPT playground.
    cmds:
      - task: kind-cluster
      - task: tinkerbell-kind-cluster
      - task: vbmc-container
      - task: vms
      - task: default-storage-pool
      - task: output-dir

  kind-cluster:
    summary: |
      Delete the KinD cluster.
    vars:
      CLUSTER_NAME:
        sh: "yq eval '.clusterName' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - kind delete cluster --name {{.CLUSTER_NAME}}
    status:
      # Returns 0 (skip) if cluster is missing; 1 (run) if cluster exists
      - "kind get clusters 2>/dev/null | grep -qx '{{.CLUSTER_NAME}}' && exit 1 || exit 0"

  tinkerbell-kind-cluster:
    if: '{{eq .EXTERNAL_TINKERBELL "true"}}'
    summary: |
      Delete the Tinkerbell KinD cluster (if it exists).
    vars:
      TINK_CLUSTER_NAME:
        sh: 'yq eval ''.kind.tinkerbell.clusterName // ""'' {{.STATE_FILE_FQ_PATH}}'
      EXTERNAL_TINKERBELL:
        sh: "yq eval '.externalTinkerbell // false' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - kind delete cluster --name "{{.TINK_CLUSTER_NAME}}"
    status:
      # Returns 0 (skip) if cluster is missing; 1 (run) if cluster exists
      - "kind get clusters 2>/dev/null | grep -qx '{{.TINK_CLUSTER_NAME}}' && exit 1 || exit 0"

  vms:
    summary: |
      Delete the VMs.
    vars:
      VM_NAMES:
        sh: "yq e '.vm.details[] | [key] | @csv' {{.STATE_FILE_FQ_PATH}}"
      VM_BASE_NAME:
        sh: "yq eval '.vm.baseName' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - for: { var: VM_NAMES }
        cmd: (virsh --connect qemu:///system destroy {{.ITEM}} || true) ## if the VM is already off, this will fail
      - for: { var: VM_NAMES }
        cmd: virsh --connect qemu:///system undefine --nvram --remove-all-storage {{.ITEM}}
    status:
      - virsh --connect qemu:///system list --all --name | grep -ce "{{.VM_BASE_NAME}}*" && exit 1 || exit 0

  default-storage-pool:
    summary: |
      Delete the default storage pool.
    cmds:
      - for vol in $(virsh --connect qemu:///system -q vol-list default | xargs | cut -d " " -f1,3,5,7,9); do virsh --connect qemu:///system vol-delete --pool default $vol; done
      - virsh --connect qemu:///system pool-destroy default || true
      - virsh --connect qemu:///system pool-undefine default
    status:
      - virsh --connect qemu:///system pool-info default && exit 1 || exit 0

  vbmc-container:
    summary: |
      Delete the Virtual BMC container.
    vars:
      VBMC_CONTAINER_NAME:
        sh: "yq eval '.virtualBMC.containerName' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - docker rm -f {{.VBMC_CONTAINER_NAME}}
    status:
      - docker inspect {{.VBMC_CONTAINER_NAME}} >/dev/null 2>&1 && exit 1 || exit 0

  vbmc-generated-files:
    summary: |
      Delete the Virtual BMC generated files. Kept for standalone invocation;
      the playground delete flow relies on `output-dir` to wipe these.
    cmds:
      - rm -f {{.OUTPUT_DIR}}/htpasswd {{.OUTPUT_DIR}}/sushy.key {{.OUTPUT_DIR}}/sushy.cert
    status:
      - test ! -f {{.OUTPUT_DIR}}/htpasswd
      - test ! -f {{.OUTPUT_DIR}}/sushy.key
      - test ! -f {{.OUTPUT_DIR}}/sushy.cert

  output-dir:
    summary: |
      Delete the output directory.
    cmds:
      - rm -rf {{.OUTPUT_DIR}}
    status:
      - test ! -d {{.OUTPUT_DIR}}
