version: "3"

includes:
  vbmc: ./Taskfile-vbmc.yaml
  capi: ./Taskfile-capi.yaml
  mirror: ./Taskfile-mirror.yaml
  helm: ./Taskfile-helm.yaml

tasks:
  playground-ordered:
    silent: true
    summary: |
      Create the CAPT playground.
    cmds:
      - task: kind-cluster
      - task: tinkerbell-kind-cluster
      - task: update-state
      - task: deploy-tinkerbell-helm-chart
      - task: vbmc:prepare
      - task: vbmc:start-server
      - task: vbmc:update-state
      - task: hardware-cr
      - task: bmc-machine-cr
      - task: bmc-secret
      - task: vms
      - task: vbmc:start-vbmcs
      - task: default-storage-pool
      - task: apply-bmc-secret
      - task: apply-bmc-machines
      - task: apply-hardware
      - task: create-external-kubeconfig-secret
      - task: capi:ordered
      - task: ensure-mgmt-namespace
      - task: allow-customization
      - task: create-workload-cluster
      - task: get-workload-cluster-kubeconfig

  allow-customization:
    prompt: The Workload cluster is ready to be provisioned. Execution is paused to allow for any User customizations. Press `y` to continue to Workload cluster creation. Press `n` to exit the whole process.
    cmds:
      - echo 'Creating Workload cluster'

  kind-cluster:
    run: once
    deps: [mirror:render-kind-config]
    summary: |
      Install the management KinD cluster.
    vars:
      ENABLED:
        sh: "yq eval '.registryMirror.enabled // false' {{.STATE_FILE_FQ_PATH}}"
      CLUSTER_NAME:
        sh: "yq eval '.clusterName' {{.STATE_FILE_FQ_PATH}}"
      KUBECONFIG:
        sh: "yq eval '.kind.kubeconfig' {{.STATE_FILE_FQ_PATH}}"
      KIND_CONFIG: "{{.OUTPUT_DIR}}/kind-config.yaml"
      KIND_CONFIG_FLAG: '{{if eq .ENABLED "true"}}--config {{.KIND_CONFIG}}{{end}}'
    cmds:
      - kind create cluster --name {{.CLUSTER_NAME}} --kubeconfig "{{.KUBECONFIG}}" {{.KIND_CONFIG_FLAG}}
      - until KUBECONFIG="{{.KUBECONFIG}}" kubectl wait --for=condition=ready node --all --timeout=5m; do echo "Waiting for nodes to be ready..."; sleep 1; done
    status:
      - KUBECONFIG="{{.KUBECONFIG}}" kind get clusters | grep -q {{.CLUSTER_NAME}}

  tinkerbell-kind-cluster:
    run: once
    if: '{{eq .EXTERNAL_TINKERBELL "true"}}'
    deps: [mirror:render-kind-config]
    summary: |
      Install a second KinD cluster that hosts the Tinkerbell stack when
      `externalTinkerbell: true`. Shares the default `kind` docker network
      with the management cluster so pods in the management cluster can
      reach the Tinkerbell API server.
    vars:
      ENABLED:
        sh: "yq eval '.registryMirror.enabled // false' {{.STATE_FILE_FQ_PATH}}"
      EXTERNAL_TINKERBELL:
        sh: "yq eval '.externalTinkerbell // false' {{.STATE_FILE_FQ_PATH}}"
      TINK_CLUSTER_NAME:
        sh: 'yq eval ''.kind.tinkerbell.clusterName // ""'' {{.STATE_FILE_FQ_PATH}}'
      TINK_KUBECONFIG:
        sh: 'yq eval ''.kind.tinkerbell.kubeconfig // ""'' {{.STATE_FILE_FQ_PATH}}'
      KIND_CONFIG: "{{.OUTPUT_DIR}}/kind-config.yaml"
      KIND_CONFIG_FLAG: '{{if eq .ENABLED "true"}}--config {{.KIND_CONFIG}}{{end}}'
    cmds:
      - kind create cluster --name "{{.TINK_CLUSTER_NAME}}" --kubeconfig "{{.TINK_KUBECONFIG}}" {{.KIND_CONFIG_FLAG}}
      - until KUBECONFIG="{{.TINK_KUBECONFIG}}" kubectl wait --for=condition=ready node --all --timeout=5m; do echo "Waiting for Tinkerbell cluster nodes to be ready..."; sleep 1; done
    status:
      - kind get clusters 2>/dev/null | grep -q "{{.TINK_CLUSTER_NAME}}"

  update-state:
    run: once
    deps: [kind-cluster, tinkerbell-kind-cluster]
    summary: |
      Re-render .state with KinD-derived values (gateway IP, bridge name)
      via the cue/state package.
    vars:
      CLUSTER_NAME:
        sh: "yq eval '.clusterName' {{.STATE_FILE_FQ_PATH}}"
      GATEWAY_IP:
        sh: "docker inspect -f '{{`{{ .NetworkSettings.Networks.kind.Gateway }}`}}' {{.CLUSTER_NAME}}-control-plane"
      NETWORK_ID:
        sh: "docker network inspect -f '{{`{{.Id}}`}}' kind"
      BRIDGE_NAME: "br-{{substr 0 12 .NETWORK_ID}}"
    cmds:
      - >-
        cue export ./cue/state yaml: config.yaml -l 'config:'
        -t cwd="$PWD"
        -t sshPubKey="$(tr -d '\n' < {{.OUTPUT_DIR}}/capt-ssh-key.pub)"
        -t gatewayIP="{{.GATEWAY_IP}}"
        -t bridgeName="{{.BRIDGE_NAME}}"
        -e out --out yaml > {{.STATE_FILE_FQ_PATH}}
    status:
      - '[[ "$(yq eval ''.kind.gatewayIP'' {{.STATE_FILE_FQ_PATH}})" == "{{.GATEWAY_IP}}" ]]'

  hardware-cr:
    run: once
    deps: [update-state]
    summary: |
      Render Hardware CRs (one per VM) from cue/infra.
    sources:
      - "{{.STATE_FILE_FQ_PATH}}"
      - cue/infra/*.cue
      - cue/values/*.cue
    generates:
      - "{{.OUTPUT_DIR}}/hardware-*.yaml"
    vars:
      NAMES:
        sh: "yq e '.vm.details[] | [key] | @csv' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - rm -f {{.OUTPUT_DIR}}/hardware-*.yaml
      - "cue vet ./cue/infra yaml: {{.STATE_FILE_FQ_PATH}} -l 'values:'"
      - for: { var: NAMES }
        cmd: "cue export ./cue/infra yaml: {{.STATE_FILE_FQ_PATH}} -l 'values:' -e outHardware.{{.ITEM}} --out yaml > {{.OUTPUT_DIR}}/hardware-{{.ITEM}}.yaml"

  bmc-machine-cr:
    run: once
    deps: [vbmc:update-state]
    summary: |
      Render BMC Machine CRs (one per VM) from cue/infra.
    sources:
      - "{{.STATE_FILE_FQ_PATH}}"
      - cue/infra/*.cue
      - cue/values/*.cue
    generates:
      - "{{.OUTPUT_DIR}}/bmc-machine-*.yaml"
    vars:
      NAMES:
        sh: "yq e '.vm.details[] | [key] | @csv' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - rm -f {{.OUTPUT_DIR}}/bmc-machine-*.yaml
      - "cue vet ./cue/infra yaml: {{.STATE_FILE_FQ_PATH}} -l 'values:'"
      - for: { var: NAMES }
        cmd: "cue export ./cue/infra yaml: {{.STATE_FILE_FQ_PATH}} -l 'values:' -e outBmcMachines.{{.ITEM}} --out yaml > {{.OUTPUT_DIR}}/bmc-machine-{{.ITEM}}.yaml"

  bmc-secret:
    run: once
    deps: [update-state]
    summary: |
      Render the shared BMC credentials Secret from cue/infra.
    sources:
      - "{{.STATE_FILE_FQ_PATH}}"
      - cue/infra/*.cue
      - cue/values/*.cue
    generates:
      - "{{.OUTPUT_DIR}}/bmc-secret.yaml"
    cmds:
      - "cue vet ./cue/infra yaml: {{.STATE_FILE_FQ_PATH}} -l 'values:'"
      - "cue export ./cue/infra yaml: {{.STATE_FILE_FQ_PATH}} -l 'values:' -e outBmcSecret --out yaml > {{.OUTPUT_DIR}}/bmc-secret.yaml"

  deploy-tinkerbell-helm-chart:
    run: once
    deps: [kind-cluster, tinkerbell-kind-cluster, update-state]
    summary: |
      Deploy the Tinkerbell Helm chart. Targets the Tinkerbell KinD cluster
      when `externalTinkerbell: true`, otherwise the management cluster.
    vars:
      KUBECONFIG:
        sh: "yq eval '(.kind.tinkerbell.kubeconfig // .kind.kubeconfig)' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - task: helm:deploy-tinkerbell-helm-chart
        vars:
          KUBECONFIG: "{{.KUBECONFIG}}"

  vms:
    run: once
    deps: [update-state, vbmc:update-state]
    summary: |
      Create Libvirt VMs.
    vars:
      TOTAL_HARDWARE:
        sh: "yq eval '.totalNodes' {{.STATE_FILE_FQ_PATH}}"
      VM_BASE_NAME:
        sh: "yq eval '.vm.baseName' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - ./scripts/create_vms.sh "{{.STATE_FILE_FQ_PATH}}"
    status:
      - expected={{.TOTAL_HARDWARE}}; got=$(virsh --connect qemu:///system list --all --name |grep -ce "{{.VM_BASE_NAME}}*"); [[ "$got" == "$expected" ]]

  apply-bmc-secret:
    run: once
    deps: [kind-cluster, tinkerbell-kind-cluster, bmc-secret]
    summary: |
      Apply the BMC secret to the cluster that hosts the Tinkerbell stack.
    vars:
      NAMESPACE:
        sh: "yq eval '.namespace' {{.STATE_FILE_FQ_PATH}}"
      KUBECONFIG:
        sh: "yq eval '(.kind.tinkerbell.kubeconfig // .kind.kubeconfig)' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - KUBECONFIG="{{.KUBECONFIG}}" kubectl apply -f {{.OUTPUT_DIR}}/bmc-secret.yaml
    status:
      - KUBECONFIG="{{.KUBECONFIG}}" kubectl get secret bmc-creds -n {{.NAMESPACE}}

  apply-bmc-machines:
    run: once
    deps: [kind-cluster, tinkerbell-kind-cluster, bmc-machine-cr]
    summary: |
      Apply the BMC machines to the cluster that hosts the Tinkerbell stack.
    vars:
      NAMES:
        sh: "yq e '.vm.details[] | [key] | @csv' {{.STATE_FILE_FQ_PATH}}"
      TOTAL_HARDWARE:
        sh: "yq eval '.totalNodes' {{.STATE_FILE_FQ_PATH}}"
      VM_BASE_NAME:
        sh: "yq eval '.vm.baseName' {{.STATE_FILE_FQ_PATH}}"
      NAMESPACE:
        sh: "yq eval '.namespace' {{.STATE_FILE_FQ_PATH}}"
      KUBECONFIG:
        sh: "yq eval '(.kind.tinkerbell.kubeconfig // .kind.kubeconfig)' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - for: { var: NAMES }
        cmd: KUBECONFIG="{{.KUBECONFIG}}" kubectl apply -f {{.OUTPUT_DIR}}/bmc-machine-{{.ITEM}}.yaml
    status:
      - expected={{.TOTAL_HARDWARE}}; got=$(KUBECONFIG="{{.KUBECONFIG}}" kubectl get machines.bmc -n {{.NAMESPACE}} | grep -ce "{{.VM_BASE_NAME}}*"); [[ "$got" == "$expected" ]]

  apply-hardware:
    run: once
    deps: [kind-cluster, tinkerbell-kind-cluster, hardware-cr]
    summary: |
      Apply the hardware to the cluster that hosts the Tinkerbell stack.
    vars:
      NAMES:
        sh: "yq e '.vm.details[] | [key] | @csv' {{.STATE_FILE_FQ_PATH}}"
      TOTAL_HARDWARE:
        sh: "yq eval '.totalNodes' {{.STATE_FILE_FQ_PATH}}"
      VM_BASE_NAME:
        sh: "yq eval '.vm.baseName' {{.STATE_FILE_FQ_PATH}}"
      NAMESPACE:
        sh: "yq eval '.namespace' {{.STATE_FILE_FQ_PATH}}"
      KUBECONFIG:
        sh: "yq eval '(.kind.tinkerbell.kubeconfig // .kind.kubeconfig)' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - for: { var: NAMES }
        cmd: KUBECONFIG="{{.KUBECONFIG}}" kubectl apply -f {{.OUTPUT_DIR}}/hardware-{{.ITEM}}.yaml
    status:
      - expected={{.TOTAL_HARDWARE}}; got=$(KUBECONFIG="{{.KUBECONFIG}}" kubectl get hardware -n {{.NAMESPACE}} | grep -ce "{{.VM_BASE_NAME}}*"); [[ "$got" == "$expected" ]]

  create-workload-cluster:
    run: once
    deps: [kind-cluster, capi:ordered, ensure-mgmt-namespace]
    summary: |
      Create the workload cluster by applying the generated manifest file.
    vars:
      CLUSTER_NAME:
        sh: "yq eval '.clusterName' {{.STATE_FILE_FQ_PATH}}"
      KUBECONFIG:
        sh: "yq eval '.kind.kubeconfig' {{.STATE_FILE_FQ_PATH}}"
      NAMESPACE:
        sh: "yq eval '.namespace' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - until KUBECONFIG="{{.KUBECONFIG}}" kubectl apply -f {{.OUTPUT_DIR}}/{{.CLUSTER_NAME}}.yaml >>{{.OUTPUT_DIR}}/error.log 2>&1; do echo "Trying kubectl apply again..."; sleep 3; done
      - echo "Workload manifest applied to cluster."
    status:
      - KUBECONFIG="{{.KUBECONFIG}}" kubectl get -n {{.NAMESPACE}} cluster {{.CLUSTER_NAME}}

  ensure-mgmt-namespace:
    run: once
    deps: [kind-cluster]
    summary: |
      Ensure the workload-cluster namespace exists in the management cluster.
      In single-cluster mode the Tinkerbell helm release creates this
      namespace as a side effect of `--create-namespace`, but in external
      Tinkerbell mode the chart targets a different cluster so the
      management cluster is missing the namespace required by the CAPI
      Cluster/KCP/MachineDeployment/etc. CRs.
    vars:
      NAMESPACE:
        sh: "yq eval '.namespace' {{.STATE_FILE_FQ_PATH}}"
      KUBECONFIG:
        sh: "yq eval '.kind.kubeconfig' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - KUBECONFIG="{{.KUBECONFIG}}" kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | KUBECONFIG="{{.KUBECONFIG}}" kubectl apply -f -
    status:
      - KUBECONFIG="{{.KUBECONFIG}}" kubectl get namespace {{.NAMESPACE}} >/dev/null 2>&1

  get-workload-cluster-kubeconfig:
    run: once
    deps: [create-workload-cluster]
    summary: |
      Get the workload cluster's kubeconfig.
    vars:
      KUBECONFIG:
        sh: "yq eval '.kind.kubeconfig' {{.STATE_FILE_FQ_PATH}}"
      NAMESPACE:
        sh: "yq eval '.namespace' {{.STATE_FILE_FQ_PATH}}"
      CLUSTER_NAME:
        sh: "yq eval '.clusterName' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - until KUBECONFIG="{{.KUBECONFIG}}" clusterctl get kubeconfig -n {{.NAMESPACE}} {{.CLUSTER_NAME}} >>{{.OUTPUT_DIR}}/error.log 2>&1 ; do echo "Waiting for workload cluster kubeconfig to be available..."; sleep 4; done
      - KUBECONFIG="{{.KUBECONFIG}}" clusterctl get kubeconfig -n {{.NAMESPACE}} {{.CLUSTER_NAME}} > {{.OUTPUT_DIR}}/{{.CLUSTER_NAME}}.kubeconfig
      - echo "Workload cluster kubeconfig saved to {{.OUTPUT_DIR}}/{{.CLUSTER_NAME}}.kubeconfig."
    status:
      - test -f {{.OUTPUT_DIR}}/{{.CLUSTER_NAME}}.kubeconfig

  default-storage-pool:
    summary: |
      Create the default storage pool for the redfish emulator to work properly.
    cmds:
      - virsh --connect qemu:///system pool-define-as --name default --type dir --target /tmp/iso
      - virsh --connect qemu:///system pool-start --build default
    status:
      - virsh --connect qemu:///system pool-info default

  create-external-kubeconfig-secret:
    if: '{{eq .EXTERNAL_TINKERBELL "true"}}'
    deps: [kind-cluster, tinkerbell-kind-cluster, update-state]
    summary: |
      When `externalTinkerbell: true`, create the
      `external-tinkerbell-kubeconfig` Secret in the management cluster's
      `capt-system` namespace so the CAPT controller (which mounts it at
      /var/run/secrets/external-tinkerbell/kubeconfig) can talk to the
      Tinkerbell KinD cluster's API server. The script labels the secret
      with clusterctl.cluster.x-k8s.io/move so a `clusterctl move` carries
      it during pivot. No-op when external mode is off.
    vars:
      EXTERNAL_TINKERBELL:
        sh: "yq eval '.externalTinkerbell // false' {{.STATE_FILE_FQ_PATH}}"
      TINK_CLUSTER_NAME:
        sh: 'yq eval ''.kind.tinkerbell.clusterName // ""'' {{.STATE_FILE_FQ_PATH}}'
      MGMT_KUBECONFIG:
        sh: "yq eval '.kind.kubeconfig' {{.STATE_FILE_FQ_PATH}}"
    cmds:
      - ./scripts/create_external_kubeconfig_secret.sh "{{.TINK_CLUSTER_NAME}}" "{{.MGMT_KUBECONFIG}}"
    status:
      - 'KUBECONFIG="{{.MGMT_KUBECONFIG}}" kubectl get secret external-tinkerbell-kubeconfig -n capt-system >/dev/null 2>&1'
