---
clusterName: "capt-playground"
outputDir: "output"
namespace: "tinkerbell"
counts:
  controlPlanes: 1
  workers: 1
  spares: 1
versions:
  capt: v0.7.0
  chart: v0.23.1-23da0880
  kube: v1.35.2
  os: 2404
  kubevip: 1.1.2
capt:
  providerRepository: "https://github.com/tinkerbell/cluster-api-provider-tinkerbell/releases"
  #providerRepository: "/home/tink/repos/tinkerbell/cluster-api-provider-tinkerbell/out/release/infrastructure-tinkerbell"
chart:
  location: "oci://ghcr.io/tinkerbell/charts/tinkerbell"
  #location: "/home/tink/repos/tinkerbell/tinkerbell/helm/tinkerbell"
  extraVars:
    - optional.captainos.enabled=true
    - optional.captainos.image=ghcr.io/tinkerbell/captain/artifacts:v0.0.0-a4be23c
    - deployment.envs.ui.enableAutoLogin=true
os:
  # the image must have a tag in the format of <ubuntu version>-<k8s version>-<arch>.gz, for example: 2404-v1.36.0-arm64.gz
  # ghcr.io/tinkerbell/cluster-api-provider-tinkerbell/ubuntu:2404-v1.36.0-arm64.gz
  registry: ghcr.io/tinkerbell/cluster-api-provider-tinkerbell/ubuntu
vm:
  baseName: "node"
  cpusPerVM: 2
  memInMBPerVM: 2048
  diskSizeInGBPerVM: 10
  diskPath: "/tmp"
virtualBMC:
  containerName: "virtualbmc"
  image: ghcr.io/jacobweinstock/virtualbmc:latest
  user: "root"
  pass: "calvin"
bootMode: netboot
externalTinkerbell: false
arch: amd64
captainos:
  kernelVersion: "6.18.16"
# Pull-through OCI registry mirror. When enabled, every image pulled from
# this directory is routed through `host` (HTTPS, publicly-trusted CA only):
#   - Host-side image strings (helm chart.location, os.registry,
#     virtualBMC.image) are rewritten to `<host>/...` in cue/state by
#     cue/mirror/#rewrite — they reach helm/docker/crane already pointing
#     at the mirror.
#   - kind nodes get a rendered `certs.d` tree bind-mounted into each
#     node at `/etc/containerd/certs.d` via `extraMounts` in the kind
#     cluster config. The certs.d tree and the kind-config YAML are
#     rendered by mirror:render-kind-config and consumed by both
#     kind-cluster and tinkerbell-kind-cluster, which pass the config
#     via --config only when this block is enabled.
#   - Workload nodes get the same drop-in via KubeadmConfigSpec.files
#     (cue/capi/resources.cue + cue/mirror/#cloudInitFiles).
# Everything else (workflow actions, kube-vip ctr pulls, all helm-chart
# Pod images including captainos, kubeadm pulls) keeps its original
# upstream hostname — the containerd mirror redirects at pull time.
# Default-disabled.
registryMirror:
  enabled: false
  host: ""
  upstreams:
    - "ghcr.io"
    - "quay.io"
    - "registry.k8s.io"
    - "gcr.io"
    - "docker.io"
