queue_rules:
  - name: default
    queue_conditions:
      - base=main
      - or:
          - "#approved-reviews-by>=1"
          - author=jacobweinstock
      - "#changes-requested-reviews-by=0"
      - "#review-requested=0"
      - check-success=DCO
      - check-success=build
      - label!=do-not-merge
      - label=ready-to-merge
    merge_conditions:
      # Conditions to get out of the queue (= merged)
      - base=main
      - or:
          - "#approved-reviews-by>=1"
          - author=jacobweinstock
      - "#changes-requested-reviews-by=0"
      - "#review-requested=0"
      - check-success=DCO
      - check-success=build
      - label!=do-not-merge
      - label=ready-to-merge
    commit_message_template: |
      {{ title }} (#{{ number }})

      {{ body }}
    merge_method: merge

pull_request_rules:
  - name: Automatic merge on approval
    conditions: []
    actions:
      queue:
merge_protections_settings:
  reporting_method: check-runs
